spring:
  datasource:
    url: jdbc:h2:mem:drawlog-test;MODE=MariaDB;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop

app:
  jwt-secret: test-secret-key-for-drawlog-that-is-long-enough
  jwt-expiration-ms: 3600000
  upload-dir: ${java.io.tmpdir}/drawlog-test-uploads
  public-upload-path: /uploads
  max-image-bytes: 5242880
  time-zone: Asia/Seoul
