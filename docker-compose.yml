services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-drawlog}
      POSTGRES_USER: ${POSTGRES_USER:-drawlog}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-drawlog}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-drawlog} -d ${POSTGRES_DB:-drawlog}"]
      interval: 10s
      timeout: 5s
      retries: 10
  backend:
    build:
      context: ./backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-drawlog}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-drawlog}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-drawlog}
      APP_JWT_SECRET: ${APP_JWT_SECRET:-drawlog-local-dev-secret-must-be-at-least-32-bytes}
      APP_ACCESS_TOKEN_EXPIRATION_MS: ${APP_ACCESS_TOKEN_EXPIRATION_MS:-1800000}
      APP_REFRESH_TOKEN_EXPIRATION_MS: ${APP_REFRESH_TOKEN_EXPIRATION_MS:-1209600000}
      APP_COOKIE_SECURE: ${APP_COOKIE_SECURE:-false}
      APP_UPLOAD_DIR: /app/uploads
      APP_TIME_ZONE: ${APP_TIME_ZONE:-Asia/Seoul}
      APP_CORS_ALLOWED_ORIGIN_PATTERNS: ${APP_CORS_ALLOWED_ORIGIN_PATTERNS:-http://localhost:5173,http://localhost:8081,http://localhost,http://127.0.0.1:8081,http://192.168.*:*,http://10.*:*,http://172.*:*,https://*.trycloudflare.com}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
    depends_on:
      - backend

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8081:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend

volumes:
  postgres_data:
  uploads:
